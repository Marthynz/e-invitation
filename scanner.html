<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔍 Scanner Kehadiran - Apple Tree Gala Dinner</title>

    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
      :root {
        --gold: #c9a84c;
        --gold-light: #e8d48b;
        --navy: #1b2a4a;
        --navy-dark: #0f1a30;
        --success: #22c55e;
        --error: #ef4444;
        --warning: #f59e0b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: var(--navy-dark);
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        padding: 20px 0;
        border-bottom: 2px solid var(--gold);
        margin-bottom: 20px;
      }

      .header h1 {
        font-family: "Playfair Display", serif;
        color: var(--gold);
        font-size: 24px;
      }

      .header p {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 5px;
      }

      .scanner-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
      }

      #reader {
        width: 100%;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        min-height: 250px;
      }

      #reader video {
        width: 100%;
        border-radius: 8px;
      }

      .scanner-controls {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
      }

      .btn-primary {
        background: var(--gold);
        color: var(--navy-dark);
      }
      .btn-primary:hover {
        background: var(--gold-light);
      }
      .btn-danger {
        background: var(--error);
        color: white;
      }
      .btn-danger:hover {
        background: #dc2626;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .result-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        min-height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        transition: border-color 0.3s;
      }

      .result-box.empty {
        opacity: 0.5;
        font-style: italic;
      }
      .result-success {
        border-color: var(--success);
        animation: pulse-success 0.5s;
      }
      .result-error {
        border-color: var(--error);
        animation: pulse-error 0.5s;
      }

      @keyframes pulse-success {
        0% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
      }

      @keyframes pulse-error {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }

      .guest-name {
        font-family: "Playfair Display", serif;
        font-size: 24px;
        color: var(--gold);
        margin: 10px 0;
      }

      .guest-seat {
        font-size: 14px;
        opacity: 0.8;
      }
      .guest-email {
        font-size: 12px;
        opacity: 0.6;
        margin-top: 5px;
      }

      .status-badge {
        display: inline-block;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-top: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-valid {
        background: var(--success);
        color: white;
      }
      .status-invalid {
        background: var(--error);
        color: white;
      }
      .status-duplicate {
        background: var(--warning);
        color: var(--navy-dark);
      }

      .checked-time {
        font-size: 11px;
        opacity: 0.7;
        margin-top: 8px;
        font-style: italic;
      }

      .stats-box {
        background: rgba(30, 45, 79, 0.9);
        border: 1px solid rgba(201, 168, 76, 0.3);
        border-radius: 12px;
        padding: 15px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        text-align: center;
        margin-bottom: 20px;
      }

      .stat-item .value {
        font-size: 22px;
        font-weight: 700;
        color: var(--gold);
      }

      .stat-item .label {
        font-size: 10px;
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--gold);
        font-size: 14px;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(201, 168, 76, 0.3);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .manual-input {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .manual-input input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid var(--gold);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 14px;
      }

      .manual-input input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }
      .manual-input input:focus {
        outline: none;
        border-color: var(--gold-light);
      }

      .log-panel {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
        padding: 10px;
        font-size: 10px;
        font-family: monospace;
        max-height: 100px;
        overflow-y: auto;
        margin-top: 15px;
        opacity: 0.7;
      }

      @media (max-width: 480px) {
        .scanner-box,
        .result-box,
        .stats-box {
          padding: 15px;
        }
        .header h1 {
          font-size: 20px;
        }
        .stats-box {
          grid-template-columns: 1fr;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>🔍 Scanner Kehadiran</h1>
        <p>Apple Tree Pre School Kupang — Gala Dinner 2026</p>
      </div>

      <!-- Stats -->
      <div class="stats-box" id="stats-box">
        <div class="stat-item">
          <div class="value" id="stat-total">-</div>
          <div class="label">Total Tamu</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-checked" style="color: #22c55e">-</div>
          <div class="label">Sudah Hadir</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-remaining">-</div>
          <div class="label">Menunggu</div>
        </div>
      </div>

      <!-- Scanner -->
      <div class="scanner-box">
        <div id="reader"></div>
        <div class="scanner-controls">
          <button
            class="btn btn-primary"
            id="btn-start"
            onclick="startScanner()"
          >
            🎥 Mulai Scan
          </button>
          <button
            class="btn btn-danger"
            id="btn-stop"
            onclick="stopScanner()"
            disabled
          >
            ⏹ Stop
          </button>
        </div>
      </div>

      <!-- Result -->
      <div class="result-box empty" id="result-box">
        <span>📷 Arahkan kamera ke QR Code undangan tamu</span>
      </div>

      <!-- Manual Input Fallback -->
      <div class="scanner-box">
        <p style="font-size: 12px; margin-bottom: 10px; opacity: 0.7">
          💡 Tidak bisa scan? Input manual:
        </p>
        <div class="manual-input">
          <input
            type="text"
            id="manual-seat"
            placeholder="seat (contoh: marthynz)"
          />
          <input
            type="text"
            id="manual-token"
            placeholder="token"
            style="flex: 0.8"
          />
          <button class="btn btn-primary" onclick="validateManual()">
            ✓ Cek
          </button>
        </div>
      </div>

      <!-- Debug Log (opsional) -->
      <details style="margin-top: 20px; opacity: 0.7">
        <summary style="cursor: pointer; font-size: 12px">🔧 Debug Log</summary>
        <div class="log-panel" id="log-panel"></div>
      </details>
    </div>

    <script>
      // ⚠️ GANTI DENGAN URL WEB APP ANDA
      const API_URL =
        "https://script.google.com/macros/s/AKfycbw703PW01pw0ZjQbYKz7z0nZdMKkWquiPhMsoHD9k1HWnk2xTJls35t54pn9LX1iGfJvA/exec";

      const CONFIG = {
        inviteBaseUrl: "https://marthynz.github.io/e-invitation",
        debugMode: true,
      };

      let html5QrCode = null;
      let isScanning = false;
      let scanPaused = false;

      document.addEventListener("DOMContentLoaded", async function () {
        console.log("🚀 Scanner initialized");
        await testAPIConnection();
        await loadStats();
      });

      async function testAPIConnection() {
        try {
          const response = await fetch(API_URL + "?action=test");
          const data = await response.json();

          if (data.success) {
            showResult(
              "✅ <strong>API Connected!</strong><br>Ready to scan QR codes.",
              "success"
            );
            setTimeout(
              () => showResult("📷 Arahkan kamera ke QR Code", "empty"),
              3000
            );
          } else {
            showResult("⚠️ API: " + data.message, "warning");
          }
        } catch (error) {
          showResult("❌ API Error: " + error.message, "error");
        }
      }

      async function startScanner() {
        if (isScanning) return;

        try {
          html5QrCode = new Html5Qrcode("reader");
          await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess,
            onScanFailure
          );

          isScanning = true;
          document.getElementById("btn-start").disabled = true;
          document.getElementById("btn-stop").disabled = false;
        } catch (err) {
          alert("Error: " + err.message);
        }
      }

      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode.stop().then(() => {
            isScanning = false;
            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-stop").disabled = true;
          });
        }
      }

      async function onScanSuccess(decodedText) {
        if (scanPaused) return;
        scanPaused = true;

        if (html5QrCode) {
          try {
            await html5QrCode.pause();
          } catch (e) {}
        }

        showResult(
          '<div class="loading"><div class="spinner"></div> Validating...</div>',
          "loading"
        );

        try {
          const qrData = parseQRData(decodedText);

          if (!qrData.seat || !qrData.token) {
            throw new Error("Invalid QR Code");
          }

          // ✅ PENTING: Gunakan action=confirm untuk update Google Sheet
          const url =
            API_URL +
            "?action=confirm&seat=" +
            encodeURIComponent(qrData.seat) +
            "&token=" +
            encodeURIComponent(qrData.token);
          
          const response = await fetch(url);
          const result = await response.json();

          if (result.success) {
            showResult(
              `
          <div style="color:#22c55e; font-size:48px; margin-bottom:10px">✅</div>
          <div style="font-size:20px; margin-bottom:5px">${result.guest.name}</div>
          <div style="font-size:14px; opacity:0.8">Seat: ${result.guest.seat}</div>
          <span style="display:inline-block; padding:6px 16px; background:#22c55e; color:white; border-radius:20px; margin-top:10px; font-size:12px">
            ${result.duplicate ? "Sudah Check-in" : "Check-in Berhasil"}
          </span>
        `,
              result.duplicate ? "warning" : "success"
            );

            if (!result.duplicate) loadStats();
          } else {
            showResult(`❌ ${result.message}`, "error");
          }
        } catch (error) {
          showResult("❌ Error: " + error.message, "error");
        }

        setTimeout(() => {
          scanPaused = false;
          if (html5QrCode && isScanning) {
            html5QrCode.resume().catch(() => {});
          }
        }, 4000);
      }

      function parseQRData(text) {
        try {
          const json = JSON.parse(text);
          return { seat: json.seat, token: json.token };
        } catch (e) {
          let urlStr = text.startsWith("http")
            ? text
            : CONFIG.inviteBaseUrl + "?" + text;
          const url = new URL(urlStr);
          return {
            seat: url.searchParams.get("seat"),
            token: url.searchParams.get("token"),
            raw: text,
          };
        }
      }

      function onScanFailure(msg) {}

      async function validateManual() {
        const seat = document.getElementById("manual-seat").value.trim();
        const token = document.getElementById("manual-token").value.trim();

        if (!seat || !token) {
          alert("Isi seat dan token");
          return;
        }

        showResult(
          '<div class="loading"><div class="spinner"></div> Checking...</div>',
          "loading"
        );

        try {
          // ✅ PENTING: Gunakan action=confirm untuk update Google Sheet
          const url =
            API_URL +
            "?action=confirm&seat=" +
            encodeURIComponent(seat) +
            "&token=" +
            encodeURIComponent(token);
          
          const response = await fetch(url);
          const result = await response.json();

          if (result.success) {
            showResult(`✅ Check-in berhasil!<br>Seat: ${seat}`, "success");
            loadStats();
          } else {
            showResult(`❌ ${result.message}`, "error");
          }
        } catch (e) {
          showResult("❌ Error: " + e.message, "error");
        }
      }

      function showResult(html, type) {
        const box = document.getElementById("result-box");
        box.className = "result-box";

        if (type === "success") box.style.borderColor = "#22c55e";
        else if (type === "error") box.style.borderColor = "#ef4444";
        else if (type === "warning") box.style.borderColor = "#f59e0b";
        else box.className += " empty";

        box.innerHTML = html;
      }

      async function loadStats() {
        try {
          const response = await fetch(API_URL + "?action=stats");
          const data = await response.json();

          if (data.success && data.stats) {
            document.getElementById("stat-total").textContent =
              data.stats.total;
            document.getElementById("stat-checked").textContent =
              data.stats.checkedIn;
            document.getElementById("stat-remaining").textContent =
              data.stats.remaining;
          }
        } catch (e) {
          console.log("Stats error:", e);
        }
      }

      window.addEventListener("beforeunload", () => {
        if (html5QrCode && isScanning) html5QrCode.stop();
      });

      setInterval(() => {
        if (!scanPaused) loadStats();
      }, 30000);

      // Add CSS
      const style = document.createElement("style");
      style.textContent = `
    .loading { display: flex; align-items: center; justify-content: center; gap: 12px; color: #c9a84c; }
    .spinner { width: 24px; height: 24px; border: 3px solid rgba(201,168,76,0.3); border-top-color: #c9a84c; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  `;
      document.head.appendChild(style);
    </script>
  </body>
</html>
