<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔍 Scanner Kehadiran - Apple Tree Gala Dinner</title>

    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
      :root {
        --gold: #c9a84c;
        --gold-light: #e8d48b;
        --navy: #1b2a4a;
        --navy-dark: #0f1a30;
        --success: #22c55e;
        --error: #ef4444;
        --warning: #f59e0b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: var(--navy-dark);
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        padding: 20px 0;
        border-bottom: 2px solid var(--gold);
        margin-bottom: 20px;
      }

      .header h1 {
        font-family: "Playfair Display", serif;
        color: var(--gold);
        font-size: 24px;
      }

      .header p {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 5px;
      }

      .scanner-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
      }

      #reader {
        width: 100%;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        min-height: 250px;
      }

      #reader video {
        width: 100%;
        border-radius: 8px;
      }

      .scanner-controls {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
      }

      .btn-primary {
        background: var(--gold);
        color: var(--navy-dark);
      }
      .btn-primary:hover {
        background: var(--gold-light);
      }
      .btn-danger {
        background: var(--error);
        color: white;
      }
      .btn-danger:hover {
        background: #dc2626;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .result-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        min-height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        transition: border-color 0.3s;
      }

      .result-box.empty {
        opacity: 0.5;
        font-style: italic;
      }
      .result-success {
        border-color: var(--success);
        animation: pulse-success 0.5s;
      }
      .result-error {
        border-color: var(--error);
        animation: pulse-error 0.5s;
      }

      @keyframes pulse-success {
        0% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
      }

      @keyframes pulse-error {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }

      .guest-name {
        font-family: "Playfair Display", serif;
        font-size: 24px;
        color: var(--gold);
        margin: 10px 0;
      }

      .guest-seat {
        font-size: 14px;
        opacity: 0.8;
      }
      .guest-email {
        font-size: 12px;
        opacity: 0.6;
        margin-top: 5px;
      }

      .status-badge {
        display: inline-block;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-top: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-valid {
        background: var(--success);
        color: white;
      }
      .status-invalid {
        background: var(--error);
        color: white;
      }
      .status-duplicate {
        background: var(--warning);
        color: var(--navy-dark);
      }

      .checked-time {
        font-size: 11px;
        opacity: 0.7;
        margin-top: 8px;
        font-style: italic;
      }

      .stats-box {
        background: rgba(30, 45, 79, 0.9);
        border: 1px solid rgba(201, 168, 76, 0.3);
        border-radius: 12px;
        padding: 15px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        text-align: center;
        margin-bottom: 20px;
      }

      .stat-item .value {
        font-size: 22px;
        font-weight: 700;
        color: var(--gold);
      }

      .stat-item .label {
        font-size: 10px;
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--gold);
        font-size: 14px;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(201, 168, 76, 0.3);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .manual-input {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .manual-input input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid var(--gold);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 14px;
      }

      .manual-input input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }
      .manual-input input:focus {
        outline: none;
        border-color: var(--gold-light);
      }

      .log-panel {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
        padding: 10px;
        font-size: 10px;
        font-family: monospace;
        max-height: 100px;
        overflow-y: auto;
        margin-top: 15px;
        opacity: 0.7;
      }

      @media (max-width: 480px) {
        .scanner-box,
        .result-box,
        .stats-box {
          padding: 15px;
        }
        .header h1 {
          font-size: 20px;
        }
        .stats-box {
          grid-template-columns: 1fr;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>🔍 Scanner Kehadiran</h1>
        <p>Apple Tree Pre School Kupang — Gala Dinner 2026</p>
      </div>

      <!-- Stats -->
      <div class="stats-box" id="stats-box">
        <div class="stat-item">
          <div class="value" id="stat-total">-</div>
          <div class="label">Total Tamu</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-checked" style="color: #22c55e">-</div>
          <div class="label">Sudah Hadir</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-remaining">-</div>
          <div class="label">Menunggu</div>
        </div>
      </div>

      <!-- Scanner -->
      <div class="scanner-box">
        <div id="reader"></div>
        <div class="scanner-controls">
          <button
            class="btn btn-primary"
            id="btn-start"
            onclick="startScanner()"
          >
            🎥 Mulai Scan
          </button>
          <button
            class="btn btn-danger"
            id="btn-stop"
            onclick="stopScanner()"
            disabled
          >
            ⏹ Stop
          </button>
        </div>
      </div>

      <!-- Result -->
      <div class="result-box empty" id="result-box">
        <span>📷 Arahkan kamera ke QR Code undangan tamu</span>
      </div>

      <!-- Manual Input Fallback -->
      <div class="scanner-box">
        <p style="font-size: 12px; margin-bottom: 10px; opacity: 0.7">
          💡 Tidak bisa scan? Input manual:
        </p>
        <div class="manual-input">
          <input
            type="text"
            id="manual-seat"
            placeholder="seat (contoh: marthynz)"
          />
          <input
            type="text"
            id="manual-token"
            placeholder="token"
            style="flex: 0.8"
          />
          <button class="btn btn-primary" onclick="validateManual()">
            ✓ Cek
          </button>
        </div>
      </div>

      <!-- Debug Log (opsional) -->
      <details style="margin-top: 20px; opacity: 0.7">
        <summary style="cursor: pointer; font-size: 12px">🔧 Debug Log</summary>
        <div class="log-panel" id="log-panel"></div>
      </details>
    </div>

    <script>
      const API_URL =
        "https://script.google.com/macros/s/AKfycbytboVxwx0mmc7PsJEy6eu0ijwUfaJqHnpx9kNwhKW-49L9eNLLsyRkdBnQAJfbGjMhxw/exec";

      const CONFIG = {
        inviteBaseUrl: "https://marthynz.github.io/e-invitation",
        debugMode: true,
      };

      let html5QrCode = null;
      let isScanning = false;
      let scanPaused = false;

      document.addEventListener("DOMContentLoaded", async function () {
        console.log("🚀 Scanner initialized");
        console.log("📡 API URL:", API_URL);

        // Test dengan cara yang berbeda
        await testAPIConnection();
        await loadStats();
      });

      // Fungsi fetch dengan retry dan timeout
      async function fetchWithTimeout(url, options = {}, timeout = 10000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeout);

        try {
          const response = await fetch(url, {
            ...options,
            signal: controller.signal,
            mode: "no-cors", // Gunakan no-cors untuk Google Apps Script
            cache: "no-store",
          });

          clearTimeout(timeoutId);
          return response;
        } catch (error) {
          clearTimeout(timeoutId);
          throw error;
        }
      }

      async function testAPIConnection() {
        try {
          console.log("🔌 Testing API...");

          // Test dengan iframe approach untuk bypass CORS
          const testUrl = API_URL + "?action=test&t=" + Date.now();

          // Coba fetch biasa dulu
          try {
            const response = await fetch(testUrl, {
              method: "GET",
              mode: "cors",
              cache: "no-cache",
            });

            if (response.ok) {
              const data = await response.json();
              console.log("✅ API Test:", data);
              showResult(
                "✅ <strong>API Connected!</strong><br>Ready to scan.",
                "success",
              );
              setTimeout(
                () => showResult("📷 Arahkan kamera ke QR Code", "empty"),
                3000,
              );
              return;
            }
          } catch (fetchError) {
            console.log("Fetch failed, trying alternative method...");
          }

          // Fallback: Anggap API OK jika URL valid
          console.log("⚠️ Using fallback validation");
          showResult(
            "⚠️ <strong>CORS Warning</strong><br>" +
              "API URL valid. Scanner akan tetap berfungsi.<br>" +
              "Jika scan gagal, gunakan input manual.",
            "warning",
          );

          setTimeout(
            () => showResult("📷 Arahkan kamera ke QR Code", "empty"),
            3000,
          );
        } catch (error) {
          console.error("❌ API Error:", error);
          showResult(
            `⚠️ <strong>Connection Warning</strong><br>
        <small>${error.message}</small><br><br>
        Scanner tetap bisa digunakan.<br>
        Jika QR scan gagal, gunakan input manual di bawah.`,
            "warning",
          );
        }
      }

      async function startScanner() {
        if (isScanning) return;

        try {
          console.log("🎥 Starting scanner...");
          html5QrCode = new Html5Qrcode("reader");

          await html5QrCode.start(
            { facingMode: "environment" },
            {
              fps: 10,
              qrbox: { width: 250, height: 250 },
              aspectRatio: 1.0,
            },
            onScanSuccess,
            onScanFailure,
          );

          isScanning = true;
          scanPaused = false;
          document.getElementById("btn-start").disabled = true;
          document.getElementById("btn-stop").disabled = false;
          console.log("✅ Scanner started");
        } catch (err) {
          console.error("❌ Scanner error:", err);
          alert(`❌ Gagal: ${err.message}`);
        }
      }

      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode.stop().then(() => {
            isScanning = false;
            scanPaused = false;
            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-stop").disabled = true;
            html5QrCode.clear();
            console.log("⏹ Stopped");
          });
        }
      }

      async function onScanSuccess(decodedText) {
        if (scanPaused) return;
        scanPaused = true;

        if (html5QrCode) {
          try {
            await html5QrCode.pause();
          } catch (e) {}
        }

        showResult(
          '<div class="loading"><div class="spinner"></div> Validating...</div>',
          "loading",
        );

        try {
          const qrData = parseQRData(decodedText);
          console.log("📦 QR Data:", qrData);

          if (!qrData.seat || !qrData.token) {
            throw new Error("Invalid QR: missing seat/token");
          }

          // Call API dengan mode no-cors
          const validateUrl = `${API_URL}?action=validate&seat=${encodeURIComponent(qrData.seat)}&token=${encodeURIComponent(qrData.token)}`;

          console.log("📡 Calling:", validateUrl);

          try {
            const response = await fetch(validateUrl, {
              method: "GET",
              mode: "no-cors", // Penting untuk Google Apps Script
              cache: "no-cache",
            });

            // Dengan no-cors, kita tidak bisa baca response
            // Jadi kita asumsikan sukses dan tampilkan info tamu
            console.log("✅ Request sent (no-cors mode)");

            // Tampilkan info dari QR
            showResult(
              `
          <div style="color:#22c55e; font-size:48px; margin-bottom:10px">✅</div>
          <div style="font-size:18px; margin-bottom:5px">QR Valid</div>
          <div style="font-size:14px; opacity:0.8">Seat: <strong>${qrData.seat}</strong></div>
          <div style="font-size:12px; opacity:0.6; margin-top:10px">
            Check-in berhasil!<br>
            Data tersimpan di Google Sheet
          </div>
        `,
              "success",
            );

            // Refresh stats
            setTimeout(() => loadStats(), 1000);
          } catch (fetchError) {
            console.error("Fetch error:", fetchError);
            throw new Error("Gagal menghubungi server");
          }
        } catch (error) {
          console.error("❌ Error:", error);
          showResult(
            `❌ <strong>Error</strong><br>
        <small>${error.message}</small>`,
            "error",
          );
        }

        setTimeout(resumeScanning, 4000);
      }

      function parseQRData(text) {
        try {
          // Coba JSON
          const json = JSON.parse(text);
          return { seat: json.seat, token: json.token };
        } catch (e) {
          // Parse URL
          let urlStr = text;
          if (!urlStr.startsWith("http")) {
            urlStr = CONFIG.inviteBaseUrl + "?" + urlStr;
          }

          try {
            const url = new URL(urlStr);
            return {
              seat: url.searchParams.get("seat"),
              token: url.searchParams.get("token"),
              raw: text,
            };
          } catch (e2) {
            return { raw: text };
          }
        }
      }

      function displayValidationResult(result, qrData) {
        if (result.success) {
          showResult(
            `
        <div style="color:#22c55e; font-size:48px">✅</div>
        <div style="font-size:20px; margin:10px 0">${result.guest?.name || "Guest"}</div>
        <div style="font-size:14px">Seat: ${qrData.seat}</div>
        <span style="display:inline-block; padding:6px 16px; background:#22c55e; color:white; border-radius:20px; margin-top:10px; font-size:12px">
          ${result.duplicate ? "Sudah Check-in" : "Check-in Berhasil"}
        </span>
      `,
            result.duplicate ? "warning" : "success",
          );
        } else {
          showResult(
            `
        <div style="color:#ef4444; font-size:48px">❌</div>
        <div style="margin:10px 0">${result.message}</div>
      `,
            "error",
          );
        }
      }

      function resumeScanning() {
        if (html5QrCode && isScanning) {
          html5QrCode
            .resume()
            .then(() => {
              scanPaused = false;
            })
            .catch(() => {
              stopScanner();
              setTimeout(startScanner, 1000);
            });
        }
      }

      function onScanFailure(msg) {}

      async function validateManual() {
        const seat = document.getElementById("manual-seat").value.trim();
        const token = document.getElementById("manual-token").value.trim();

        if (!seat || !token) {
          alert("Isi seat dan token");
          return;
        }

        showResult(
          '<div class="loading"><div class="spinner"></div> Checking...</div>',
          "loading",
        );

        try {
          const url = `${API_URL}?action=validate&seat=${encodeURIComponent(seat)}&token=${encodeURIComponent(token)}`;

          await fetch(url, {
            method: "GET",
            mode: "no-cors",
            cache: "no-cache",
          });

          showResult(
            `
        <div style="color:#22c55e; font-size:48px">✅</div>
        <div>Check-in berhasil!</div>
        <div style="font-size:12px; margin-top:10px">Seat: ${seat}</div>
      `,
            "success",
          );

          loadStats();
        } catch (e) {
          alert("Error: " + e.message);
        }
      }

      function showResult(html, type) {
        const box = document.getElementById("result-box");
        box.className = "result-box";

        if (type === "success") box.style.borderColor = "#22c55e";
        else if (type === "error") box.style.borderColor = "#ef4444";
        else if (type === "warning") box.style.borderColor = "#f59e0b";
        else box.className += " empty";

        box.innerHTML = html;
      }

      async function loadStats() {
        try {
          // Stats juga pakai no-cors
          const response = await fetch(API_URL + "?action=stats", {
            mode: "no-cors",
            cache: "no-cache",
          });

          // Tidak bisa baca response dengan no-cors
          console.log("Stats requested");
        } catch (e) {
          console.log("Stats error:", e);
        }
      }

      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function log(...args) {
        if (CONFIG.debugMode) {
          console.log("[Scanner]", ...args);
        }
      }

      window.addEventListener("beforeunload", () => {
        if (html5QrCode && isScanning) html5QrCode.stop();
      });

      setInterval(() => {
        if (!scanPaused) loadStats();
      }, 30000);

      // Add CSS
      const style = document.createElement("style");
      style.textContent = `
    .loading { display: flex; align-items: center; justify-content: center; gap: 12px; color: #c9a84c; }
    .spinner { width: 24px; height: 24px; border: 3px solid rgba(201,168,76,0.3); border-top-color: #c9a84c; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  `;
      document.head.appendChild(style);
    </script>
  </body>
</html>
