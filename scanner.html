<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔍 Scanner Kehadiran - Apple Tree Gala Dinner</title>

    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
      :root {
        --gold: #c9a84c;
        --navy: #1b2a4a;
        --navy-dark: #0f1a30;
        --success: #22c55e;
        --error: #ef4444;
        --warning: #f59e0b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: var(--navy-dark);
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        padding: 20px 0;
        border-bottom: 2px solid var(--gold);
        margin-bottom: 20px;
      }

      .header h1 {
        font-family: "Playfair Display", serif;
        color: var(--gold);
        font-size: 24px;
      }

      .header p {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 5px;
      }

      /* Scanner Area */
      .scanner-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
      }

      #reader {
        width: 100%;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
      }

      #reader video {
        width: 100%;
        border-radius: 8px;
      }

      .scanner-controls {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--gold);
        color: var(--navy-dark);
      }

      .btn-primary:hover {
        background: #e8d48b;
      }

      .btn-danger {
        background: var(--error);
        color: white;
      }

      .btn-danger:hover {
        background: #dc2626;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Result Display */
      .result-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        min-height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .result-box.empty {
        opacity: 0.5;
        font-style: italic;
      }

      .result-success {
        border-color: var(--success);
        animation: pulse-success 0.5s;
      }

      .result-error {
        border-color: var(--error);
        animation: pulse-error 0.5s;
      }

      @keyframes pulse-success {
        0% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
      }

      @keyframes pulse-error {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }

      .guest-name {
        font-family: "Playfair Display", serif;
        font-size: 24px;
        color: var(--gold);
        margin: 10px 0;
      }

      .guest-seat {
        font-size: 14px;
        opacity: 0.8;
      }

      .status-badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-top: 10px;
      }

      .status-valid {
        background: var(--success);
        color: white;
      }
      .status-invalid {
        background: var(--error);
        color: white;
      }
      .status-duplicate {
        background: var(--warning);
        color: var(--navy-dark);
      }

      /* Stats */
      .stats-box {
        background: rgba(30, 45, 79, 0.9);
        border: 1px solid rgba(201, 168, 76, 0.3);
        border-radius: 12px;
        padding: 15px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        text-align: center;
      }

      .stat-item .value {
        font-size: 20px;
        font-weight: 700;
        color: var(--gold);
      }

      .stat-item .label {
        font-size: 10px;
        opacity: 0.7;
        text-transform: uppercase;
      }

      /* Loading */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: var(--gold);
      }

      .spinner {
        width: 20px;
        height: 20px;
        border: 3px solid rgba(201, 168, 76, 0.3);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Responsive */
      @media (max-width: 480px) {
        .scanner-box,
        .result-box,
        .stats-box {
          padding: 15px;
        }
        .header h1 {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>🔍 Scanner Kehadiran</h1>
        <p>Apple Tree Pre School Kupang — Gala Dinner 2026</p>
      </div>

      <!-- Stats -->
      <div class="stats-box" id="stats-box">
        <div class="stat-item">
          <div class="value" id="stat-total">-</div>
          <div class="label">Total Tamu</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-checked" style="color: #22c55e">-</div>
          <div class="label">Sudah Hadir</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-remaining">-</div>
          <div class="label">Menunggu</div>
        </div>
      </div>

      <!-- Scanner -->
      <div class="scanner-box">
        <div id="reader"></div>
        <div class="scanner-controls">
          <button
            class="btn btn-primary"
            id="btn-start"
            onclick="startScanner()"
          >
            🎥 Mulai Scan
          </button>
          <button
            class="btn btn-danger"
            id="btn-stop"
            onclick="stopScanner()"
            disabled
          >
            ⏹ Stop
          </button>
        </div>
      </div>

      <!-- Result -->
      <div class="result-box empty" id="result-box">
        <span>Scan QR Code undangan tamu untuk validasi kehadiran</span>
      </div>

      <!-- Manual Input (Fallback) -->
      <div class="scanner-box">
        <p style="font-size: 12px; margin-bottom: 10px; opacity: 0.7">
          💡 Tidak bisa scan? Input manual:
        </p>
        <div style="display: flex; gap: 10px">
          <input
            type="text"
            id="manual-seat"
            placeholder="seat (contoh: marthynz)"
            style="
              flex: 1;
              padding: 10px;
              border: 1px solid var(--gold);
              border-radius: 6px;
              background: rgba(255, 255, 255, 0.1);
              color: #fff;
            "
          />
          <button class="btn btn-primary" onclick="validateManual()">
            ✓ Cek
          </button>
        </div>
      </div>
    </div>

    <script>
      // ⚠️ GANTI DENGAN URL WEB APP ANDA
      const API_URL =
        "https://script.google.com/macros/s/AKfycbytboVxwx0mmc7PsJEy6eu0ijwUfaJqHnpx9kNwhKW-49L9eNLLsyRkdBnQAJfbGjMhxw/exec";

      // Konfigurasi
      const CONFIG = {
        inviteBaseUrl: "https://marthynz.github.io/e-invitation?",
        debugMode: true, // Set false di production
      };

      let html5QrCode = null;
      let isScanning = false;
      let scanPaused = false;

      // Test koneksi API saat load
      document.addEventListener("DOMContentLoaded", async function () {
        log("Scanner initialized");
        await testAPIConnection();
        await loadStats();
      });

      // Test koneksi ke API
      async function testAPIConnection() {
        try {
          log("Testing API connection...");
          const response = await fetch(
            `${API_URL}?action=test&origin=${window.location.origin}`,
            {
              method: "GET",
              mode: "cors",
            },
          );

          const data = await response.json();
          log("API Test Result:", data);

          if (data.success || data.status === "ok") {
            showResult("✅ API Connected! Ready to scan.", "success");
          } else {
            showResult(
              "⚠️ API connected but returned: " + JSON.stringify(data),
              "warning",
            );
          }
        } catch (error) {
          log("API Connection Error:", error);
          showResult(
            `❌ Cannot connect to API<br><small>${error.message}</small><br><br>Check:<br>1. API URL is correct<br>2. Web App is deployed<br>3. CORS is enabled`,
            "error",
          );
        }
      }

      // Start QR Scanner
      async function startScanner() {
        if (isScanning) return;

        try {
          log("Starting scanner...");
          html5QrCode = new Html5Qrcode("reader");

          const devices = await Html5Qrcode.getCameras();
          log("Available cameras:", devices);

          await html5QrCode.start(
            { facingMode: "environment" },
            {
              fps: 10,
              qrbox: { width: 250, height: 250 },
              aspectRatio: 1.0,
              disableFlip: false,
            },
            onScanSuccess,
            onScanFailure,
          );

          isScanning = true;
          scanPaused = false;
          document.getElementById("btn-start").disabled = true;
          document.getElementById("btn-stop").disabled = false;
          log("Scanner started successfully");
        } catch (err) {
          log("Scanner error:", err);
          showResult(
            `❌ Gagal mengakses kamera<br><small>${err.message}</small><br><br>Pastikan:<br>1. Izin kamera diberikan<br>2. Menggunakan HTTPS<br>3. Browser mendukung`,
            "error",
          );
        }
      }

      // Stop QR Scanner
      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode
            .stop()
            .then(() => {
              isScanning = false;
              scanPaused = false;
              document.getElementById("btn-start").disabled = false;
              document.getElementById("btn-stop").disabled = true;
              html5QrCode.clear();
              log("Scanner stopped");
            })
            .catch((err) => {
              log("Stop error:", err);
            });
        }
      }

      // Handle successful scan
      async function onScanSuccess(decodedText) {
        if (scanPaused) return;

        // Pause scanning
        scanPaused = true;
        if (html5QrCode) {
          try {
            await html5QrCode.pause();
          } catch (e) {
            log("Pause error:", e);
          }
        }

        log("QR Scanned:", decodedText);
        showResult(
          '<div class="loading"><div class="spinner"></div> Memvalidasi QR Code...</div>',
          "loading",
        );

        try {
          // Parse QR data
          let qrData = parseQRData(decodedText);
          log("Parsed QR Data:", qrData);

          if (!qrData.seat) {
            throw new Error(
              `Invalid QR format. Missing: seat`,
            );
          }

          // Call validation API - only include token if present
          let validateUrl = `${API_URL}?action=validate&seat=${encodeURIComponent(qrData.seat)}&origin=${window.location.origin}`;
          if (qrData.token) {
            validateUrl += `&token=${encodeURIComponent(qrData.token)}`;
          }

          log("Calling API:", validateUrl);

          const response = await fetch(validateUrl, {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            mode: "cors",
            credentials: "omit",
          });

          log("Response status:", response.status);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }

          const result = await response.json();
          log("API Response:", result);

          displayValidationResult(result, qrData);
        } catch (error) {
          log("Validation error:", error);
          showResult(
            `❌ Gagal validasi<br><small>${error.message}</small><br><br>Check console untuk detail`,
            "error",
          );
        }

        // Resume scanning after delay
        setTimeout(() => {
          resumeScanning();
        }, 4000);
      }

      function parseQRData(decodedText) {
        try {
          // Coba parse sebagai JSON
          return JSON.parse(decodedText);
        } catch (e) {
          // Jika bukan JSON, coba parse sebagai URL
          try {
            let urlStr = decodedText;
            if (!urlStr.includes("http")) {
              urlStr = CONFIG.inviteBaseUrl + urlStr;
            }

            const url = new URL(urlStr);
            return {
              seat: url.searchParams.get("seat"),
              token: url.searchParams.get("token"),
              raw: decodedText,
            };
          } catch (e2) {
            log("Parse error:", e2);
            return { raw: decodedText };
          }
        }
      }

      function displayValidationResult(result, qrData) {
        if (result.success) {
          showResult(
            `
        <div style="color:#22c55e; font-size:50px; margin-bottom:10px">✅</div>
        <div class="guest-name">${result.guest.name || "Unknown"}</div>
        <div class="guest-seat">Seat: ${result.guest.seat || qrData.seat}</div>
        <span class="status-badge status-valid">✓ Kehadiran Dikonfirmasi</span>
        <div style="margin-top:15px; font-size:12px; opacity:0.7">
          🕐 ${new Date().toLocaleString("id-ID")}
        </div>
        `,
            "success",
          );
          playSound("success");
          loadStats(); // Refresh stats
        } else if (
          result.duplicate ||
          result.message === "Already checked in"
        ) {
          showResult(
            `
        <div style="color:#f59e0b; font-size:50px; margin-bottom:10px">⚠️</div>
        <div class="guest-name">${result.guest?.name || "Unknown"}</div>
        <div class="guest-seat">Seat: ${result.guest?.seat || qrData.seat}</div>
        <span class="status-badge status-duplicate">Sudah Check-in</span>
        <div style="margin-top:15px; font-size:11px; opacity:0.7">
          🕐 ${result.guest?.checkedAt ? new Date(result.guest.checkedAt).toLocaleString("id-ID") : "-"}
        </div>
        `,
            "warning",
          );
          playSound("warning");
        } else {
          showResult(
            `
        <div style="color:#ef4444; font-size:50px; margin-bottom:10px">❌</div>
        <div style="font-weight:600; margin:10px 0; font-size:18px">Tidak Valid</div>
        <span class="status-badge status-invalid">${result.message || result.error || "Unknown error"}</span>
        <div style="margin-top:15px; font-size:11px; opacity:0.7; max-width:300px; word-break:break-all">
          Seat: ${qrData.seat}<br>
          ${result.searched ? "Token: " + qrData.token : ""}
        </div>
        `,
            "error",
          );
          playSound("error");
        }
      }

      function resumeScanning() {
        if (html5QrCode && isScanning) {
          html5QrCode
            .resume()
            .then(() => {
              scanPaused = false;
              log("Scanner resumed");
            })
            .catch((err) => {
              log("Resume error:", err);
              // Restart scanner jika resume gagal
              stopScanner();
              setTimeout(() => startScanner(), 1000);
            });
        }
      }

      // Handle scan failure
      function onScanFailure(message) {
        // Don't log every failure to avoid spam
        // log('Scan failure:', message);
      }

      // Manual validation
      async function validateManual() {
        const seat = document.getElementById("manual-seat").value.trim();
        if (!seat) {
          showResult("⚠️ Masukkan seat terlebih dahulu", "error");
          return;
        }

        const token = prompt("Masukkan token untuk " + seat + ":");
        if (!token) return;

        showResult(
          '<div class="loading"><div class="spinner"></div> Memvalidasi...</div>',
          "loading",
        );

        try {
          const response = await fetch(
            `${API_URL}?action=validate&seat=${encodeURIComponent(seat)}&token=${encodeURIComponent(token)}&origin=${window.location.origin}`,
            {
              method: "GET",
              headers: { "Content-Type": "application/json" },
              mode: "cors",
            },
          );

          const result = await response.json();
          displayValidationResult(result, { seat, token });

          if (result.success) {
            loadStats();
          }
        } catch (e) {
          log("Manual validation error:", e);
          showResult(
            "❌ Gagal terhubung ke server<br><small>" + e.message + "</small>",
            "error",
          );
        }
      }

      // Display result
      function showResult(html, type) {
        const box = document.getElementById("result-box");
        box.className = "result-box";

        if (type === "success") {
          box.classList.add("result-success");
        } else if (type === "error") {
          box.classList.add("result-error");
        } else if (type === "warning") {
          box.style.borderColor = "var(--warning)";
        } else if (type === "loading" || type === "empty") {
          box.classList.add("empty");
        }

        box.innerHTML = html;
      }

      // Load stats
      async function loadStats() {
        try {
          const response = await fetch(
            `${API_URL}?action=stats&origin=${window.location.origin}`,
            {
              method: "GET",
              mode: "cors",
            },
          );

          const data = await response.json();
          log("Stats loaded:", data);

          if (data.success && data.stats) {
            document.getElementById("stat-total").textContent =
              data.stats.total;
            document.getElementById("stat-checked").textContent =
              data.stats.checkedIn;
            document.getElementById("stat-remaining").textContent =
              data.stats.remaining;
          } else {
            log("Stats error:", data);
          }
        } catch (e) {
          log("Failed to load stats:", e);
        }
      }

      // Sound feedback
      function playSound(type) {
        // Optional: Add actual sound files
        log("🔊 Sound:", type);
      }

      // Debug logging
      function log(...args) {
        if (CONFIG.debugMode) {
          console.log("[Scanner]", ...args);
        }
      }

      // Cleanup
      window.addEventListener("beforeunload", function () {
        if (html5QrCode && isScanning) {
          html5QrCode.stop();
        }
      });

      // Auto-refresh stats every 30 seconds
      setInterval(() => {
        if (!scanPaused) {
          loadStats();
        }
      }, 30000);
    </script>
  </body>
</html>
