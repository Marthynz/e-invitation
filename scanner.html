<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔍 Scanner Kehadiran - Apple Tree Gala Dinner</title>

    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
      :root {
        --gold: #c9a84c;
        --gold-light: #e8d48b;
        --navy: #1b2a4a;
        --navy-dark: #0f1a30;
        --success: #22c55e;
        --error: #ef4444;
        --warning: #f59e0b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: var(--navy-dark);
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        padding: 20px 0;
        border-bottom: 2px solid var(--gold);
        margin-bottom: 20px;
      }

      .header h1 {
        font-family: "Playfair Display", serif;
        color: var(--gold);
        font-size: 24px;
      }

      .header p {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 5px;
      }

      .scanner-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
      }

      #reader {
        width: 100%;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        min-height: 250px;
      }

      #reader video {
        width: 100%;
        border-radius: 8px;
      }

      .scanner-controls {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
      }

      .btn-primary {
        background: var(--gold);
        color: var(--navy-dark);
      }
      .btn-primary:hover {
        background: var(--gold-light);
      }
      .btn-danger {
        background: var(--error);
        color: white;
      }
      .btn-danger:hover {
        background: #dc2626;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .result-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        min-height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        transition: border-color 0.3s;
      }

      .result-box.empty {
        opacity: 0.5;
        font-style: italic;
      }
      .result-success {
        border-color: var(--success);
        animation: pulse-success 0.5s;
      }
      .result-error {
        border-color: var(--error);
        animation: pulse-error 0.5s;
      }

      @keyframes pulse-success {
        0% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
      }

      @keyframes pulse-error {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }

      .guest-name {
        font-family: "Playfair Display", serif;
        font-size: 24px;
        color: var(--gold);
        margin: 10px 0;
      }

      .guest-seat {
        font-size: 14px;
        opacity: 0.8;
      }
      .guest-email {
        font-size: 12px;
        opacity: 0.6;
        margin-top: 5px;
      }

      .status-badge {
        display: inline-block;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-top: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-valid {
        background: var(--success);
        color: white;
      }
      .status-invalid {
        background: var(--error);
        color: white;
      }
      .status-duplicate {
        background: var(--warning);
        color: var(--navy-dark);
      }

      .checked-time {
        font-size: 11px;
        opacity: 0.7;
        margin-top: 8px;
        font-style: italic;
      }

      .stats-box {
        background: rgba(30, 45, 79, 0.9);
        border: 1px solid rgba(201, 168, 76, 0.3);
        border-radius: 12px;
        padding: 15px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        text-align: center;
        margin-bottom: 20px;
      }

      .stat-item .value {
        font-size: 22px;
        font-weight: 700;
        color: var(--gold);
      }

      .stat-item .label {
        font-size: 10px;
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--gold);
        font-size: 14px;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(201, 168, 76, 0.3);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .manual-input {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .manual-input input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid var(--gold);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 14px;
      }

      .manual-input input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }
      .manual-input input:focus {
        outline: none;
        border-color: var(--gold-light);
      }

      .log-panel {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
        padding: 10px;
        font-size: 10px;
        font-family: monospace;
        max-height: 100px;
        overflow-y: auto;
        margin-top: 15px;
        opacity: 0.7;
      }

      @media (max-width: 480px) {
        .scanner-box,
        .result-box,
        .stats-box {
          padding: 15px;
        }
        .header h1 {
          font-size: 20px;
        }
        .stats-box {
          grid-template-columns: 1fr;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>🔍 Scanner Kehadiran</h1>
        <p>Apple Tree Pre School Kupang — Gala Dinner 2026</p>
      </div>

      <!-- Stats -->
      <div class="stats-box" id="stats-box">
        <div class="stat-item">
          <div class="value" id="stat-total">-</div>
          <div class="label">Total Tamu</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-checked" style="color: #22c55e">-</div>
          <div class="label">Sudah Hadir</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-remaining">-</div>
          <div class="label">Menunggu</div>
        </div>
      </div>

      <!-- Scanner -->
      <div class="scanner-box">
        <div id="reader"></div>
        <div class="scanner-controls">
          <button
            class="btn btn-primary"
            id="btn-start"
            onclick="startScanner()"
          >
            🎥 Mulai Scan
          </button>
          <button
            class="btn btn-danger"
            id="btn-stop"
            onclick="stopScanner()"
            disabled
          >
            ⏹ Stop
          </button>
        </div>
      </div>

      <!-- Result -->
      <div class="result-box empty" id="result-box">
        <span>📷 Arahkan kamera ke QR Code undangan tamu</span>
      </div>

      <!-- Manual Input Fallback -->
      <div class="scanner-box">
        <p style="font-size: 12px; margin-bottom: 10px; opacity: 0.7">
          💡 Tidak bisa scan? Input manual:
        </p>
        <div class="manual-input">
          <input
            type="text"
            id="manual-seat"
            placeholder="seat (contoh: marthynz)"
          />
          <input
            type="text"
            id="manual-token"
            placeholder="token"
            style="flex: 0.8"
          />
          <button class="btn btn-primary" onclick="validateManual()">
            ✓ Cek
          </button>
        </div>
      </div>

      <!-- Debug Log (opsional) -->
      <details style="margin-top: 20px; opacity: 0.7">
        <summary style="cursor: pointer; font-size: 12px">🔧 Debug Log</summary>
        <div class="log-panel" id="log-panel"></div>
      </details>
    </div>

    <script>
      // ⚠️ PENTING: GANTI DENGAN URL WEB APP ANDA
      // Format: https://script.google.com/macros/s/XXXXXX/exec
      const API_URL =
        "https://script.google.com/macros/s/AKfycbytboVxwx0mmc7PsJEy6eu0ijwUfaJqHnpx9kNwhKW-49L9eNLLsyRkdBnQAJfbGjMhxw/exec";

      const CONFIG = {
        inviteBaseUrl: "https://marthynz.github.io/e-invitation",
        debugMode: true, // Set true untuk lihat log
      };

      let html5QrCode = null;
      let isScanning = false;
      let scanPaused = false;

      document.addEventListener("DOMContentLoaded", async function () {
        log("🚀 Scanner initialized");

        // Validasi API_URL
        if (!API_URL || API_URL.includes("...") || API_URL === "") {
          showResult(
            `❌ <strong>API_URL belum dikonfigurasi!</strong><br><br>
        Silakan edit file scanner.html dan ganti:<br>
        <code>const API_URL = "https://script.google.com/..."</code><br><br>
        Dengan URL Web App Anda yang sebenarnya.`,
            "error",
          );
          return;
        }

        await testAPIConnection();
        await loadStats();
      });

      // Test koneksi API
      async function testAPIConnection() {
        try {
          log("🔌 Testing API connection to:", API_URL);

          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 10000);

          const response = await fetch(`${API_URL}?action=test`, {
            method: "GET",
            mode: "cors",
            signal: controller.signal,
          });

          clearTimeout(timeoutId);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }

          const data = await response.json();
          log("✅ API Test Response:", data);

          if (data.success) {
            showResult(
              "✅ <strong>API Connected!</strong><br>Ready to scan QR codes.",
              "success",
            );
            setTimeout(() => {
              if (!isScanning) {
                showResult(
                  "📷 Arahkan kamera ke QR Code undangan tamu",
                  "empty",
                );
              }
            }, 3000);
          } else {
            showResult(`⚠️ API Warning: ${JSON.stringify(data)}`, "warning");
          }
        } catch (error) {
          log("❌ API Connection Error:", error);

          let errorMsg = "Unknown error";
          if (error.name === "AbortError") {
            errorMsg = "Request timeout (10 detik)";
          } else if (error.message.includes("Failed to fetch")) {
            errorMsg = "Failed to fetch - CORS atau URL salah";
          } else {
            errorMsg = error.message;
          }

          showResult(
            `❌ <strong>Cannot connect to API</strong><br>
        <small>${errorMsg}</small><br><br>
        <strong>Pastikan:</strong><br>
        1. URL Web App benar (lihat console)<br>
        2. Web App deployed sebagai "Anyone"<br>
        3. Menggunakan HTTPS (bukan HTTP)<br>
        4. Apps Script tidak ada error<br><br>
        <strong>URL yang digunakan:</strong><br>
        <code style="font-size:10px">${API_URL}</code>`,
            "error",
          );
        }
      }

      // Start QR Scanner
      async function startScanner() {
        if (isScanning) return;

        try {
          log("🎥 Starting scanner...");

          // Cek permission
          if (!navigator.mediaDevices) {
            throw new Error(
              "Browser tidak mendukung akses kamera. Gunakan Chrome/Firefox dengan HTTPS.",
            );
          }

          html5QrCode = new Html5Qrcode("reader");

          await html5QrCode.start(
            { facingMode: "environment" },
            {
              fps: 10,
              qrbox: { width: 250, height: 250 },
              aspectRatio: 1.0,
            },
            onScanSuccess,
            onScanFailure,
          );

          isScanning = true;
          scanPaused = false;
          document.getElementById("btn-start").disabled = true;
          document.getElementById("btn-stop").disabled = false;
          log("✅ Scanner started successfully");
        } catch (err) {
          log("❌ Scanner error:", err);

          let errorMsg = err.message;
          if (err.name === "NotAllowedError") {
            errorMsg =
              "Izin kamera ditolak. Klik icon gembok di address bar untuk izinkan.";
          } else if (err.name === "NotFoundError") {
            errorMsg = "Kamera tidak ditemukan.";
          } else if (err.name === "NotSupportedError") {
            errorMsg = "HTTPS diperlukan untuk akses kamera.";
          }

          alert(
            `❌ Gagal memulai scanner:\n\n${errorMsg}\n\nLihat console untuk detail.`,
          );
        }
      }

      // Stop QR Scanner
      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode
            .stop()
            .then(() => {
              isScanning = false;
              scanPaused = false;
              document.getElementById("btn-start").disabled = false;
              document.getElementById("btn-stop").disabled = true;
              html5QrCode.clear();
              log("⏹ Scanner stopped");
            })
            .catch((err) => log("Stop error:", err));
        }
      }

      // Handle successful scan
      async function onScanSuccess(decodedText, decodedResult) {
        if (scanPaused) return;

        log("📦 QR Scanned:", decodedText);

        // Pause scanning
        scanPaused = true;
        if (html5QrCode) {
          try {
            await html5QrCode.pause();
          } catch (e) {}
        }

        showResult(
          '<div class="loading"><div class="spinner"></div> Memvalidasi QR Code...</div>',
          "loading",
        );

        try {
          // Parse QR data
          const qrData = parseQRData(decodedText);
          log("🔍 Parsed QR Data:", qrData);

          // Validasi data QR
          if (!qrData.seat) {
            throw new Error("QR Code tidak mengandung parameter 'seat'");
          }

          if (!qrData.token) {
            throw new Error("QR Code tidak mengandung parameter 'token'");
          }

          // Call validation API
          const validateUrl = `${API_URL}?action=validate&seat=${encodeURIComponent(qrData.seat)}&token=${encodeURIComponent(qrData.token)}`;
          log("📡 Calling API:", validateUrl);

          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 15000);

          const response = await fetch(validateUrl, {
            method: "GET",
            mode: "cors",
            signal: controller.signal,
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
          });

          clearTimeout(timeoutId);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }

          const result = await response.json();
          log("📥 API Response:", result);

          displayValidationResult(result, qrData);

          // Refresh stats jika berhasil
          if (result.success && !result.duplicate) {
            await loadStats();
          }
        } catch (error) {
          log("❌ Validation error:", error);

          let errorMsg = error.message;
          if (error.name === "AbortError") {
            errorMsg = "Request timeout. Periksa koneksi internet.";
          }

          showResult(
            `❌ <strong>Gagal validasi QR Code</strong><br>
        <small>${errorMsg}</small><br><br>
        <strong>QR Data:</strong><br>
        <code style="font-size:10px">${escapeHtml(decodedText)}</code>`,
            "error",
          );
        }

        // Resume scanning setelah 4 detik
        setTimeout(resumeScanning, 4000);
      }

      // Parse QR data dari URL atau JSON
      function parseQRData(decodedText) {
        // Coba parse sebagai JSON
        try {
          const json = JSON.parse(decodedText);
          return {
            seat: json.seat,
            token: json.token,
            email: json.email,
            isJson: true,
          };
        } catch (e) {
          // Bukan JSON, coba parse sebagai URL
        }

        // Parse sebagai URL
        try {
          let urlStr = decodedText;

          // Jika bukan URL lengkap, tambahkan base URL
          if (!urlStr.startsWith("http://") && !urlStr.startsWith("https://")) {
            urlStr = CONFIG.inviteBaseUrl + "?" + urlStr;
          }

          const url = new URL(urlStr);
          return {
            seat: url.searchParams.get("seat"),
            token: url.searchParams.get("token"),
            confirmed: url.searchParams.get("confirmed"),
            raw: decodedText,
            isJson: false,
          };
        } catch (e) {
          log("❌ Parse error:", e);
          return {
            raw: decodedText,
            error: e.message,
          };
        }
      }

      // Display validation result
      function displayValidationResult(result, qrData) {
        if (result.success) {
          const guest = result.guest || {};
          const name = guest.name || "Unknown";
          const seat = guest.seat || qrData.seat;

          if (result.duplicate) {
            const checkedTime = guest.checkedAt
              ? new Date(guest.checkedAt).toLocaleString("id-ID", {
                  dateStyle: "medium",
                  timeStyle: "short",
                })
              : "-";

            showResult(
              `
          <div style="color:#f59e0b; font-size:56px; margin-bottom:10px">⚠️</div>
          <div style="font-family:'Playfair Display'; font-size:24px; color:#c9a84c; margin-bottom:8px">${escapeHtml(name)}</div>
          <div style="font-size:14px; opacity:0.8; margin-bottom:5px">Seat: <strong>${escapeHtml(seat)}</strong></div>
          ${guest.email ? `<div style="font-size:12px; opacity:0.6">${escapeHtml(guest.email)}</div>` : ""}
          <span style="display:inline-block; padding:6px 16px; background:#f59e0b; color:#0f1a30; border-radius:20px; font-size:12px; font-weight:600; margin-top:12px">Sudah Check-in</span>
          <div style="margin-top:10px; font-size:11px; opacity:0.7">🕐 ${checkedTime}</div>
        `,
              "warning",
            );
          } else {
            showResult(
              `
          <div style="color:#22c55e; font-size:56px; margin-bottom:10px; animation:scaleIn 0.3s">✅</div>
          <div style="font-family:'Playfair Display'; font-size:24px; color:#c9a84c; margin-bottom:8px">${escapeHtml(name)}</div>
          <div style="font-size:14px; opacity:0.8; margin-bottom:5px">Seat: <strong>${escapeHtml(seat)}</strong></div>
          ${guest.email ? `<div style="font-size:12px; opacity:0.6">${escapeHtml(guest.email)}</div>` : ""}
          <span style="display:inline-block; padding:6px 16px; background:#22c55e; color:white; border-radius:20px; font-size:12px; font-weight:600; margin-top:12px">✓ Check-in Berhasil</span>
          <div style="margin-top:10px; font-size:11px; opacity:0.7">🕐 ${new Date().toLocaleString("id-ID")}</div>
        `,
              "success",
            );
          }
        } else {
          showResult(
            `
        <div style="color:#ef4444; font-size:56px; margin-bottom:10px">❌</div>
        <div style="font-weight:600; margin:10px 0; font-size:18px">Tidak Valid</div>
        <span style="display:inline-block; padding:6px 16px; background:#ef4444; color:white; border-radius:20px; font-size:12px; font-weight:600; margin-top:10px">${escapeHtml(result.message || "Unknown error")}</span>
        <div style="margin-top:15px; font-size:11px; opacity:0.7; max-width:100%; word-break:break-all">
          <strong>QR Content:</strong><br>
          <code style="font-size:9px">${escapeHtml(qrData.raw || "N/A")}</code>
        </div>
      `,
            "error",
          );
        }
      }

      function resumeScanning() {
        if (html5QrCode && isScanning) {
          html5QrCode
            .resume()
            .then(() => {
              scanPaused = false;
              log("🔄 Scanner resumed");
            })
            .catch((err) => {
              log("❌ Resume error:", err);
              stopScanner();
              setTimeout(() => startScanner(), 1000);
            });
        }
      }

      function onScanFailure(message) {
        // Silent - jangan spam log
      }

      // Manual validation
      async function validateManual() {
        const seat = document.getElementById("manual-seat").value.trim();
        const token = document.getElementById("manual-token").value.trim();

        if (!seat) {
          alert("⚠️ Masukkan seat terlebih dahulu");
          return;
        }

        if (!token) {
          alert("⚠️ Masukkan token");
          return;
        }

        showResult(
          '<div class="loading"><div class="spinner"></div> Memvalidasi...</div>',
          "loading",
        );

        try {
          const response = await fetch(
            `${API_URL}?action=validate&seat=${encodeURIComponent(seat)}&token=${encodeURIComponent(token)}`,
            {
              method: "GET",
              mode: "cors",
              headers: { "Content-Type": "application/json" },
            },
          );

          const result = await response.json();
          displayValidationResult(result, {
            seat,
            token,
            raw: `Manual: ${seat}`,
          });

          if (result.success && !result.duplicate) {
            await loadStats();
          }
        } catch (e) {
          log("❌ Manual validation error:", e);
          alert("❌ Gagal terhubung ke server\n\n" + e.message);
        }
      }

      // Show result
      function showResult(html, type) {
        const box = document.getElementById("result-box");
        box.className = "result-box";

        if (type === "success") {
          box.style.borderColor = "#22c55e";
          box.innerHTML = html;
        } else if (type === "error") {
          box.style.borderColor = "#ef4444";
          box.innerHTML = html;
        } else if (type === "warning") {
          box.style.borderColor = "#f59e0b";
          box.innerHTML = html;
        } else {
          box.className += " empty";
          box.innerHTML = html;
        }
      }

      // Load stats
      async function loadStats() {
        try {
          const response = await fetch(`${API_URL}?action=stats`, {
            method: "GET",
            mode: "cors",
          });

          const data = await response.json();
          log("📊 Stats:", data);

          if (data.success && data.stats) {
            document.getElementById("stat-total").textContent =
              data.stats.total || 0;
            document.getElementById("stat-checked").textContent =
              data.stats.checkedIn || 0;
            document.getElementById("stat-remaining").textContent =
              data.stats.remaining || 0;
          }
        } catch (e) {
          log("❌ Stats error:", e);
        }
      }

      // Escape HTML
      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Debug logging
      function log(...args) {
        if (CONFIG.debugMode) {
          console.log("[Scanner]", ...args);
        }
      }

      // Cleanup
      window.addEventListener("beforeunload", () => {
        if (html5QrCode && isScanning) {
          html5QrCode.stop();
        }
      });

      // Auto-refresh stats
      setInterval(() => {
        if (!scanPaused && isScanning) {
          loadStats();
        }
      }, 30000);

      // Add CSS animations
      const style = document.createElement("style");
      style.textContent = `
    @keyframes scaleIn { 
      from { transform: scale(0); } 
      to { transform: scale(1); } 
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #c9a84c;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(201,168,76,0.3);
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  `;
      document.head.appendChild(style);
    </script>
  </body>
</html>
