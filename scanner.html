<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔍 Scanner Kehadiran - Apple Tree Gala Dinner</title>

    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
      :root {
        --gold: #c9a84c;
        --gold-light: #e8d48b;
        --navy: #1b2a4a;
        --navy-dark: #0f1a30;
        --success: #22c55e;
        --error: #ef4444;
        --warning: #f59e0b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: var(--navy-dark);
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        padding: 20px 0;
        border-bottom: 2px solid var(--gold);
        margin-bottom: 20px;
      }

      .header h1 {
        font-family: "Playfair Display", serif;
        color: var(--gold);
        font-size: 24px;
      }

      .header p {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 5px;
      }

      .scanner-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
      }

      #reader {
        width: 100%;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        min-height: 250px;
      }

      #reader video {
        width: 100%;
        border-radius: 8px;
      }

      .scanner-controls {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
      }

      .btn-primary {
        background: var(--gold);
        color: var(--navy-dark);
      }
      .btn-primary:hover {
        background: var(--gold-light);
      }
      .btn-danger {
        background: var(--error);
        color: white;
      }
      .btn-danger:hover {
        background: #dc2626;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .result-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        min-height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        transition: border-color 0.3s;
      }

      .result-box.empty {
        opacity: 0.5;
        font-style: italic;
      }
      .result-success {
        border-color: var(--success);
        animation: pulse-success 0.5s;
      }
      .result-error {
        border-color: var(--error);
        animation: pulse-error 0.5s;
      }

      @keyframes pulse-success {
        0% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
      }

      @keyframes pulse-error {
        0% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
        }
      }

      .guest-name {
        font-family: "Playfair Display", serif;
        font-size: 24px;
        color: var(--gold);
        margin: 10px 0;
      }

      .guest-seat {
        font-size: 14px;
        opacity: 0.8;
      }
      .guest-email {
        font-size: 12px;
        opacity: 0.6;
        margin-top: 5px;
      }

      .status-badge {
        display: inline-block;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        margin-top: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-valid {
        background: var(--success);
        color: white;
      }
      .status-invalid {
        background: var(--error);
        color: white;
      }
      .status-duplicate {
        background: var(--warning);
        color: var(--navy-dark);
      }

      .checked-time {
        font-size: 11px;
        opacity: 0.7;
        margin-top: 8px;
        font-style: italic;
      }

      .stats-box {
        background: rgba(30, 45, 79, 0.9);
        border: 1px solid rgba(201, 168, 76, 0.3);
        border-radius: 12px;
        padding: 15px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        text-align: center;
        margin-bottom: 20px;
      }

      .stat-item .value {
        font-size: 22px;
        font-weight: 700;
        color: var(--gold);
      }

      .stat-item .label {
        font-size: 10px;
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--gold);
        font-size: 14px;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(201, 168, 76, 0.3);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .manual-input {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .manual-input input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid var(--gold);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 14px;
      }

      .manual-input input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }
      .manual-input input:focus {
        outline: none;
        border-color: var(--gold-light);
      }

      .log-panel {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
        padding: 10px;
        font-size: 10px;
        font-family: monospace;
        max-height: 100px;
        overflow-y: auto;
        margin-top: 15px;
        opacity: 0.7;
      }

      @media (max-width: 480px) {
        .scanner-box,
        .result-box,
        .stats-box {
          padding: 15px;
        }
        .header h1 {
          font-size: 20px;
        }
        .stats-box {
          grid-template-columns: 1fr;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>🔍 Scanner Kehadiran</h1>
        <p>Apple Tree Pre School Kupang — Gala Dinner 2026</p>
      </div>

      <!-- Stats -->
      <div class="stats-box" id="stats-box">
        <div class="stat-item">
          <div class="value" id="stat-total">-</div>
          <div class="label">Total Tamu</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-checked" style="color: #22c55e">-</div>
          <div class="label">Sudah Hadir</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-remaining">-</div>
          <div class="label">Menunggu</div>
        </div>
      </div>

      <!-- Scanner -->
      <div class="scanner-box">
        <div id="reader"></div>
        <div class="scanner-controls">
          <button
            class="btn btn-primary"
            id="btn-start"
            onclick="startScanner()"
          >
            🎥 Mulai Scan
          </button>
          <button
            class="btn btn-danger"
            id="btn-stop"
            onclick="stopScanner()"
            disabled
          >
            ⏹ Stop
          </button>
        </div>
      </div>

      <!-- Result -->
      <div class="result-box empty" id="result-box">
        <span>📷 Arahkan kamera ke QR Code undangan tamu</span>
      </div>

      <!-- Manual Input Fallback -->
      <div class="scanner-box">
        <p style="font-size: 12px; margin-bottom: 10px; opacity: 0.7">
          💡 Tidak bisa scan? Input manual:
        </p>
        <div class="manual-input">
          <input
            type="text"
            id="manual-seat"
            placeholder="seat (contoh: marthynz)"
          />
          <input
            type="text"
            id="manual-token"
            placeholder="token"
            style="flex: 0.8"
          />
          <button class="btn btn-primary" onclick="validateManual()">
            ✓ Cek
          </button>
        </div>
      </div>

      <!-- Debug Log (opsional) -->
      <details style="margin-top: 20px; opacity: 0.7">
        <summary style="cursor: pointer; font-size: 12px">🔧 Debug Log</summary>
        <div class="log-panel" id="log-panel"></div>
      </details>
    </div>

    <script>
      // ⚠️ GANTI DENGAN URL WEB APP ANDA
      const API_URL =
        "https://script.google.com/macros/s/AKfycbytboVxwx0mmc7PsJEy6eu0ijwUfaJqHnpx9kNwhKW-49L9eNLLsyRkdBnQAJfbGjMhxw/exec";

      const CONFIG = {
        inviteBaseUrl: "https://marthynz.github.io/e-invitation?",
        debugMode: false, // Set true untuk debug
      };

      let html5QrCode = null;
      let isScanning = false;
      let scanPaused = false;

      document.addEventListener("DOMContentLoaded", async function () {
        log("🚀 Scanner initialized");
        await testAPIConnection();
        await loadStats();
      });

      // Test koneksi API
      async function testAPIConnection() {
        try {
          log("🔌 Testing API connection...");
          const response = await fetch(`${API_URL}?action=test`, {
            mode: "cors",
          });
          const data = await response.json();
          log("✅ API Test:", data);

          if (data.success) {
            showToast("✅ API Connected!", "success");
          } else {
            showResult("⚠️ API Warning: " + JSON.stringify(data), "warning");
          }
        } catch (error) {
          log("❌ API Error:", error);
          showResult(
            `❌ Cannot connect to API<br><small>${error.message}</small><br><br>
            Pastikan:<br>
            1. URL Web App benar<br>
            2. Web App deployed sebagai "Anyone"<br>
            3. Menggunakan HTTPS`,
            "error",
          );
        }
      }

      // Start QR Scanner
      async function startScanner() {
        if (isScanning) return;

        try {
          log("🎥 Starting scanner...");
          html5QrCode = new Html5Qrcode("reader");

          await html5QrCode.start(
            { facingMode: "environment" },
            {
              fps: 10,
              qrbox: { width: 250, height: 250 },
              aspectRatio: 1.0,
            },
            onScanSuccess,
            onScanFailure,
          );

          isScanning = true;
          scanPaused = false;
          document.getElementById("btn-start").disabled = true;
          document.getElementById("btn-stop").disabled = false;
          log("✅ Scanner started");
        } catch (err) {
          log("❌ Scanner error:", err);
          showResult(
            `❌ Gagal mengakses kamera<br><small>${err.message}</small><br><br>
            Pastikan:<br>
            1. Izin kamera diberikan<br>
            2. Menggunakan HTTPS<br>
            3. Browser mendukung WebRTC`,
            "error",
          );
        }
      }

      // Stop QR Scanner
      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode
            .stop()
            .then(() => {
              isScanning = false;
              scanPaused = false;
              document.getElementById("btn-start").disabled = false;
              document.getElementById("btn-stop").disabled = true;
              html5QrCode.clear();
              log("⏹ Scanner stopped");
            })
            .catch((err) => log("Stop error:", err));
        }
      }

      // Handle successful scan
      async function onScanSuccess(decodedText) {
        if (scanPaused) return;
        scanPaused = true;

        // Pause scanner sementara
        if (html5QrCode) {
          try {
            await html5QrCode.pause();
          } catch (e) {}
        }

        log("📦 QR Scanned:", decodedText);
        showResult(
          '<div class="loading"><div class="spinner"></div> Memvalidasi...</div>',
          "loading",
        );

        try {
          const qrData = parseQRData(decodedText);
          log("🔍 Parsed:", qrData);

          if (!qrData.seat || !qrData.token) {
            throw new Error("QR tidak valid: missing seat atau token");
          }

          // Call validation API (action=validate akan update checked_at)
          const validateUrl = `${API_URL}?action=validate&seat=${encodeURIComponent(qrData.seat)}&token=${encodeURIComponent(qrData.token)}`;

          const response = await fetch(validateUrl, {
            method: "GET",
            mode: "cors",
            headers: { "Content-Type": "application/json" },
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const result = await response.json();
          log("📡 API Response:", result);

          displayValidationResult(result, qrData);

          if (result.success && !result.duplicate) {
            playSound("success");
            await loadStats(); // Refresh stats
          } else if (result.duplicate) {
            playSound("warning");
          } else {
            playSound("error");
          }
        } catch (error) {
          log("❌ Validation error:", error);
          showResult(
            `❌ Gagal validasi<br><small>${error.message}</small>`,
            "error",
          );
          playSound("error");
        }

        // Resume scanning setelah 3.5 detik
        setTimeout(resumeScanning, 3500);
      }

      // Parse QR data (URL atau JSON)
      function parseQRData(decodedText) {
        // Coba parse JSON dulu
        try {
          const json = JSON.parse(decodedText);
          return { seat: json.seat, token: json.token, email: json.email };
        } catch (e) {}

        // Parse sebagai URL
        try {
          let urlStr = decodedText;
          if (!urlStr.startsWith("http")) {
            urlStr = CONFIG.inviteBaseUrl + urlStr;
          }
          const url = new URL(urlStr);
          return {
            seat: url.searchParams.get("seat"),
            token: url.searchParams.get("token"),
            confirmed: url.searchParams.get("confirmed"),
            raw: decodedText,
          };
        } catch (e) {
          return { raw: decodedText };
        }
      }

      // Display result dengan format elegan
      function displayValidationResult(result, qrData) {
        if (result.success) {
          const guest = result.guest || {};
          const checkedTime = guest.checkedAt
            ? new Date(guest.checkedAt).toLocaleString("id-ID", {
                dateStyle: "medium",
                timeStyle: "short",
              })
            : "-";

          showResult(
            `
            <div style="color:#22c55e; font-size:56px; margin-bottom:8px; animation:scaleIn 0.3s">✅</div>
            <div class="guest-name">${escapeHtml(guest.name || "Unknown")}</div>
            <div class="guest-seat">🪑 Seat: <strong>${escapeHtml(guest.seat || qrData.seat)}</strong></div>
            ${guest.email ? `<div class="guest-email">✉️ ${escapeHtml(guest.email)}</div>` : ""}
            <span class="status-badge status-valid">${result.duplicate ? "✓ Sudah Check-in" : "✓ Kehadiran Dikonfirmasi"}</span>
            <div class="checked-time">
              ${result.duplicate ? `🕐 Check-in sebelumnya: ${checkedTime}` : `🕐 Check-in: ${new Date().toLocaleString("id-ID")}`}
            </div>
          `,
            "success",
          );
        } else if (result.duplicate || result.message?.includes("sudah")) {
          const guest = result.guest || {};
          const checkedTime = guest.checkedAt
            ? new Date(guest.checkedAt).toLocaleString("id-ID", {
                dateStyle: "medium",
                timeStyle: "short",
              })
            : "-";

          showResult(
            `
            <div style="color:#f59e0b; font-size:56px; margin-bottom:8px">⚠️</div>
            <div class="guest-name">${escapeHtml(guest.name || "Unknown")}</div>
            <div class="guest-seat">🪑 Seat: ${escapeHtml(guest.seat || qrData.seat)}</div>
            <span class="status-badge status-duplicate">Sudah Check-in</span>
            <div class="checked-time">🕐 ${checkedTime}</div>
          `,
            "warning",
          );
        } else {
          showResult(
            `
            <div style="color:#ef4444; font-size:56px; margin-bottom:8px">❌</div>
            <div style="font-weight:600; margin:10px 0; font-size:18px">Tidak Valid</div>
            <span class="status-badge status-invalid">${escapeHtml(result.message || "Unknown error")}</span>
            <div style="margin-top:15px; font-size:11px; opacity:0.7">
              Seat: ${escapeHtml(qrData.seat || "-")}<br>
              Token: ${qrData.token ? "***" + qrData.token.slice(-4) : "-"}
            </div>
          `,
            "error",
          );
        }
      }

      function resumeScanning() {
        if (html5QrCode && isScanning) {
          html5QrCode
            .resume()
            .then(() => {
              scanPaused = false;
              log("🔄 Scanner resumed");
            })
            .catch((err) => {
              log("Resume failed, restarting...", err);
              stopScanner();
              setTimeout(startScanner, 1000);
            });
        }
      }

      function onScanFailure(message) {
        // Silent fail - jangan spam console
      }

      // Manual validation
      async function validateManual() {
        const seat = document.getElementById("manual-seat").value.trim();
        const token = document.getElementById("manual-token").value.trim();

        if (!seat || !token) {
          showResult("⚠️ Masukkan seat DAN token", "error");
          return;
        }

        showResult(
          '<div class="loading"><div class="spinner"></div> Memvalidasi...</div>',
          "loading",
        );

        try {
          const response = await fetch(
            `${API_URL}?action=validate&seat=${encodeURIComponent(seat)}&token=${encodeURIComponent(token)}`,
            { method: "GET", mode: "cors" },
          );
          const result = await response.json();
          displayValidationResult(result, { seat, token });

          if (result.success && !result.duplicate) await loadStats();
        } catch (e) {
          log("Manual error:", e);
          showResult("❌ Gagal terhubung ke server", "error");
        }
      }

      // Show result with animation
      function showResult(html, type) {
        const box = document.getElementById("result-box");
        box.className = "result-box"; // Reset classes

        if (type === "success") box.classList.add("result-success");
        else if (type === "error") box.classList.add("result-error");
        else if (type === "warning") box.style.borderColor = "var(--warning)";
        else if (type === "loading" || type === "empty")
          box.classList.add("empty");

        box.innerHTML = html;
      }

      // Load stats from API
      async function loadStats() {
        try {
          const response = await fetch(`${API_URL}?action=stats`, {
            mode: "cors",
          });
          const data = await response.json();

          if (data.success && data.stats) {
            document.getElementById("stat-total").textContent =
              data.stats.total;
            document.getElementById("stat-checked").textContent =
              data.stats.checkedIn;
            document.getElementById("stat-remaining").textContent =
              data.stats.remaining;
            log("📊 Stats updated:", data.stats);
          }
        } catch (e) {
          log("Stats error:", e);
        }
      }

      // Sound feedback (opsional - bisa ditambah file audio)
      function playSound(type) {
        // Contoh: new Audio(`/sounds/${type}.mp3`).play().catch(()=>{});
        log("🔊 Sound:", type);
      }

      // Escape HTML untuk mencegah XSS
      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Debug logging
      function log(...args) {
        if (CONFIG.debugMode) {
          console.log("[Scanner]", ...args);
          const panel = document.getElementById("log-panel");
          if (panel) {
            const time = new Date().toLocaleTimeString();
            panel.innerHTML += `<div>[${time}] ${args.map((a) => (typeof a === "object" ? JSON.stringify(a) : a)).join(" ")}</div>`;
            panel.scrollTop = panel.scrollHeight;
          }
        }
      }

      // Toast notification
      function showToast(message, type = "info") {
        const toast = document.createElement("div");
        toast.style.cssText = `
          position:fixed; top:20px; left:50%; transform:translateX(-50%);
          background:${type === "success" ? "#22c55e" : type === "error" ? "#ef4444" : "#3b82f6"};
          color:white; padding:12px 24px; border-radius:8px; 
          font-weight:500; z-index:10000; animation:slideIn 0.3s, fadeOut 0.3s 2.7s;
        `;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      // Cleanup
      window.addEventListener("beforeunload", () => {
        if (html5QrCode && isScanning) html5QrCode.stop();
      });

      // Auto-refresh stats
      setInterval(() => {
        if (!scanPaused) loadStats();
      }, 30000);

      // CSS animations
      const style = document.createElement("style");
      style.textContent = `
        @keyframes scaleIn { from{transform:scale(0)} to{transform:scale(1)} }
        @keyframes slideIn { from{opacity:0;transform:translate(-50%,-20px)} to{opacity:1;transform:translate(-50%,0)} }
        @keyframes fadeOut { from{opacity:1} to{opacity:0} }
      `;
      document.head.appendChild(style);
    </script>
  </body>
</html>
