<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔍 Scanner Kehadiran - Apple Tree Gala Dinner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
      :root {
        --gold: #c9a84c;
        --gold-light: #e8d48b;
        --navy: #1b2a4a;
        --navy-dark: #0f1a30;
        --success: #22c55e;
        --error: #ef4444;
        --warning: #f59e0b;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Montserrat", sans-serif;
        background: var(--navy-dark);
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }
      .container { max-width: 600px; margin: 0 auto; }
      .header {
        text-align: center;
        padding: 20px 0;
        border-bottom: 2px solid var(--gold);
        margin-bottom: 20px;
      }
      .header h1 {
        font-family: "Playfair Display", serif;
        color: var(--gold);
        font-size: 24px;
      }
      .header p { font-size: 12px; opacity: 0.7; margin-top: 5px; }
      
      .stats-box {
        background: rgba(30, 45, 79, 0.9);
        border: 1px solid rgba(201, 168, 76, 0.3);
        border-radius: 12px;
        padding: 15px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        text-align: center;
        margin-bottom: 20px;
      }
      .stat-item .value { font-size: 22px; font-weight: 700; color: var(--gold); }
      .stat-item .label { font-size: 10px; opacity: 0.7; text-transform: uppercase; }
      
      .scanner-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
      }
      #reader {
        width: 100%;
        border-radius: 8px;
        overflow: hidden;
        background: #000;
        min-height: 300px;
        position: relative;
      }
      #reader video { width: 100%; border-radius: 8px; }
      
      /* Scanner overlay */
      .scanner-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 250px;
        height: 250px;
        border: 3px solid var(--gold);
        border-radius: 12px;
        pointer-events: none;
        box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
      }
      .scanner-overlay::before,
      .scanner-overlay::after {
        content: '';
        position: absolute;
        width: 30px;
        height: 30px;
        border-color: var(--gold);
        border-style: solid;
        border-width: 0;
      }
      .scanner-overlay::before {
        top: -3px; left: -3px;
        border-top-width: 4px;
        border-left-width: 4px;
        border-radius: 12px 0 0 0;
      }
      .scanner-overlay::after {
        top: -3px; right: -3px;
        border-top-width: 4px;
        border-right-width: 4px;
        border-radius: 0 12px 0 0;
      }
      
      .scanner-controls {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }
      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
      }
      .btn-primary { background: var(--gold); color: var(--navy-dark); }
      .btn-primary:hover { background: var(--gold-light); }
      .btn-danger { background: var(--error); color: white; }
      .btn-danger:hover { background: #dc2626; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      
      .result-box {
        background: rgba(30, 45, 79, 0.9);
        border: 2px solid var(--gold);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        min-height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        transition: all 0.3s;
      }
      .result-box.empty { opacity: 0.5; font-style: italic; }
      .result-success { border-color: var(--success); background: rgba(34, 197, 94, 0.1); }
      .result-error { border-color: var(--error); background: rgba(239, 68, 68, 0.1); }
      .result-warning { border-color: var(--warning); background: rgba(245, 158, 11, 0.1); }
      
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--gold);
        font-size: 14px;
      }
      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(201, 168, 76, 0.3);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      
      .manual-input {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }
      .manual-input input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid var(--gold);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-size: 14px;
      }
      .manual-input input::placeholder { color: rgba(255, 255, 255, 0.5); }
      .manual-input input:focus { outline: none; border-color: var(--gold-light); }
      
      .debug-info {
        background: rgba(0, 0, 0, 0.4);
        border-radius: 8px;
        padding: 15px;
        margin-top: 15px;
        font-family: monospace;
        font-size: 11px;
        max-height: 200px;
        overflow-y: auto;
      }
      .debug-info h4 {
        color: var(--gold);
        margin-bottom: 10px;
        font-size: 12px;
      }
      .debug-line {
        padding: 3px 0;
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }
      .debug-line.success { color: var(--success); }
      .debug-line.error { color: var(--error); }
      .debug-line.info { color: #60a5fa; }
      
      .qr-detected {
        animation: pulse-border 0.5s ease-in-out;
      }
      @keyframes pulse-border {
        0%, 100% { border-color: var(--gold); }
        50% { border-color: var(--success); box-shadow: 0 0 20px var(--success); }
      }
      
      @media (max-width: 480px) {
        .scanner-box, .result-box, .stats-box { padding: 15px; }
        .header h1 { font-size: 20px; }
        .stats-box { grid-template-columns: 1fr; gap: 8px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🔍 Scanner Kehadiran</h1>
        <p>Apple Tree Pre School Kupang — Gala Dinner 2026</p>
      </div>

      <!-- Stats -->
      <div class="stats-box">
        <div class="stat-item">
          <div class="value" id="stat-total">-</div>
          <div class="label">Total Tamu</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-checked" style="color: #22c55e">-</div>
          <div class="label">Sudah Hadir</div>
        </div>
        <div class="stat-item">
          <div class="value" id="stat-remaining">-</div>
          <div class="label">Menunggu</div>
        </div>
      </div>

      <!-- Scanner -->
      <div class="scanner-box">
        <div id="reader">
          <div class="scanner-overlay" id="scanner-overlay" style="display: none;"></div>
        </div>
        <div class="scanner-controls">
          <button class="btn btn-primary" id="btn-start" onclick="startScanner()">
            🎥 Mulai Scan
          </button>
          <button class="btn btn-danger" id="btn-stop" onclick="stopScanner()" disabled>
            ⏹ Stop
          </button>
        </div>
      </div>

      <!-- Result -->
      <div class="result-box empty" id="result-box">
        <span>📷 Arahkan kamera ke QR Code undangan tamu</span>
      </div>

      <!-- Manual Input -->
      <div class="scanner-box">
        <p style="font-size: 12px; margin-bottom: 10px; opacity: 0.7">
          💡 Tidak bisa scan? Input manual:
        </p>
        <div class="manual-input">
          <input type="text" id="manual-seat" placeholder="seat (contoh: marthynz)" />
          <input type="text" id="manual-token" placeholder="token" style="flex: 0.8" />
          <button class="btn btn-primary" onclick="validateManual()">✓ Cek</button>
        </div>
      </div>

      <!-- Debug Info -->
      <div class="scanner-box">
        <details>
          <summary style="cursor: pointer; color: var(--gold); font-weight: 600;">
            🔧 Debug Information (Klik untuk expand)
          </summary>
          <div class="debug-info" id="debug-info">
            <div class="debug-line info">Menunggu scanner dimulai...</div>
          </div>
        </details>
      </div>
    </div>

    <script>
      const API_URL = "https://script.google.com/macros/s/AKfycbw703PW01pw0ZjQbYKz7z0nZdMKkWquiPhMsoHD9k1HWnk2xTJls35t54pn9LX1iGfJvA/exec";
      const CONFIG = {
        inviteBaseUrl: "https://marthynz.github.io/e-invitation",
        debugMode: true,
      };

      let html5QrCode = null;
      let isScanning = false;
      let scanPaused = false;
      let debugLines = [];

      function addDebug(message, type = 'info') {
        const time = new Date().toLocaleTimeString();
        debugLines.unshift({ time, message, type });
        if (debugLines.length > 20) debugLines.pop();
        updateDebugDisplay();
        console.log(`[${type.toUpperCase()}]`, message);
      }

      function updateDebugDisplay() {
        const debugDiv = document.getElementById('debug-info');
        if (!debugDiv) return;
        debugDiv.innerHTML = debugLines.map(line => 
          `<div class="debug-line ${line.type}">[${line.time}] ${line.message}</div>`
        ).join('');
      }

      document.addEventListener("DOMContentLoaded", async function () {
        addDebug("Scanner initialized", "info");
        await testAPIConnection();
        await loadStats();
      });

      async function testAPIConnection() {
        addDebug("Testing API connection...", "info");
        try {
          const response = await fetch(API_URL + "?action=test");
          const data = await response.json();
          addDebug("API Response: " + JSON.stringify(data), data.success ? "success" : "error");
          
          if (data.success) {
            showResult("✅ <strong>API Connected!</strong><br>Ready to scan.", "success");
            setTimeout(() => showResult("📷 Arahkan kamera ke QR Code", "empty"), 3000);
          } else {
            showResult("⚠️ API: " + data.message, "warning");
          }
        } catch (error) {
          addDebug("API Error: " + error.message, "error");
          showResult("❌ API Error: " + error.message, "error");
        }
      }

      async function startScanner() {
        if (isScanning) return;
        addDebug("Starting scanner...", "info");

        try {
          html5QrCode = new Html5Qrcode("reader");
          
          await html5QrCode.start(
            { facingMode: "environment" },
            { 
              fps: 10, 
              qrbox: { width: 250, height: 250 },
              aspectRatio: 1.0,
              disableFlip: false
            },
            onScanSuccess,
            onScanFailure
          );

          isScanning = true;
          document.getElementById("btn-start").disabled = true;
          document.getElementById("btn-stop").disabled = false;
          document.getElementById("scanner-overlay").style.display = "block";
          addDebug("Scanner started successfully", "success");
          showResult("📷 Scanner aktif. Arahkan ke QR Code...", "empty");
          
        } catch (err) {
          addDebug("Scanner start error: " + err.message, "error");
          alert("Error starting scanner: " + err.message);
        }
      }

      function stopScanner() {
        if (html5QrCode && isScanning) {
          html5QrCode.stop().then(() => {
            isScanning = false;
            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-stop").disabled = true;
            document.getElementById("scanner-overlay").style.display = "none";
            addDebug("Scanner stopped", "info");
          });
        }
      }

      async function onScanSuccess(decodedText, decodedResult) {
        if (scanPaused) return;
        
        addDebug("QR DETECTED! Raw data: " + decodedText, "success");
        
        // Visual feedback
        const overlay = document.getElementById("scanner-overlay");
        overlay.classList.add("qr-detected");
        setTimeout(() => overlay.classList.remove("qr-detected"), 500);
        
        scanPaused = true;
        if (html5QrCode) {
          try { await html5QrCode.pause(); } catch (e) {}
        }

        showResult('<div class="loading"><div class="spinner"></div> Validating QR...</div>', "loading");
        addDebug("Parsing QR data...", "info");

        try {
          const qrData = parseQRData(decodedText);
          addDebug("Parsed QR: " + JSON.stringify(qrData), "info");

          if (!qrData.seat) {
            throw new Error("QR tidak mengandung parameter 'seat'");
          }
          if (!qrData.token) {
            throw new Error("QR tidak mengandung parameter 'token'");
          }

          addDebug("Validating with API...", "info");
          const url = API_URL + "?action=confirm&seat=" + encodeURIComponent(qrData.seat) + "&token=" + encodeURIComponent(qrData.token);
          addDebug("Request URL: " + url, "info");
          
          const response = await fetch(url);
          addDebug("Response status: " + response.status, "info");
          
          const result = await response.json();
          addDebug("API Response: " + JSON.stringify(result), result.success ? "success" : "error");

          if (result.success) {
            const guestName = result.guest?.name || "Unknown";
            const seatName = result.guest?.seat || qrData.seat;
            const status = result.duplicate ? "Sudah Check-in" : "Check-in Berhasil";
            const statusClass = result.duplicate ? "warning" : "success";
            
            showResult(`
              <div style="color:#22c55e; font-size:48px; margin-bottom:10px">✅</div>
              <div style="font-size:20px; margin-bottom:5px; font-weight:600">${guestName}</div>
              <div style="font-size:14px; opacity:0.8">Seat: ${seatName}</div>
              <span style="display:inline-block; padding:6px 16px; background:#22c55e; color:white; border-radius:20px; margin-top:10px; font-size:12px">
                ${status}
              </span>
            `, statusClass);
            
            addDebug(`Check-in ${result.duplicate ? 'duplicate' : 'success'} for ${guestName}`, result.duplicate ? "warning" : "success");
            
            if (!result.duplicate) {
              await loadStats();
            }
          } else {
            showResult(`❌ ${result.message}`, "error");
            addDebug("Validation failed: " + result.message, "error");
          }
        } catch (error) {
          addDebug("Validation error: " + error.message, "error");
          showResult(`❌ Error: ${error.message}<br><br><small>QR: ${decodedText.substring(0, 100)}</small>`, "error");
        }

        setTimeout(() => {
          scanPaused = false;
          if (html5QrCode && isScanning) {
            html5QrCode.resume().then(() => {
              addDebug("Scanner resumed", "info");
            }).catch(() => {});
          }
        }, 4000);
      }

      function parseQRData(text) {
        addDebug("Raw QR text: " + text, "info");
        
        // Try JSON first
        try {
          const json = JSON.parse(text);
          addDebug("QR is JSON format", "info");
          return { seat: json.seat, token: json.token, isJson: true };
        } catch (e) {
          // Not JSON, try URL
        }

        // Parse as URL
        let urlStr = text;
        if (!urlStr.startsWith("http")) {
          urlStr = CONFIG.inviteBaseUrl + "?" + urlStr;
        }
        
        try {
          const url = new URL(urlStr);
          const seat = url.searchParams.get("seat");
          const token = url.searchParams.get("token");
          addDebug("QR is URL format", "info");
          addDebug("Extracted seat: " + seat + ", token: " + (token ? token.substring(0, 4) + "..." : "none"), "info");
          
          return {
            seat: seat,
            token: token,
            raw: text,
            isJson: false
          };
        } catch (e) {
          addDebug("Failed to parse as URL: " + e.message, "error");
          return { raw: text, error: e.message };
        }
      }

      function onScanFailure(error) {
        // Silent - don't spam debug
      }

      async function validateManual() {
        const seat = document.getElementById("manual-seat").value.trim();
        const token = document.getElementById("manual-token").value.trim();

        if (!seat || !token) {
          alert("Isi seat dan token");
          return;
        }

        addDebug("Manual validation: seat=" + seat + ", token=" + token.substring(0, 4) + "...", "info");
        showResult('<div class="loading"><div class="spinner"></div> Checking...</div>', "loading");

        try {
          const url = API_URL + "?action=confirm&seat=" + encodeURIComponent(seat) + "&token=" + encodeURIComponent(token);
          const response = await fetch(url);
          const result = await response.json();
          addDebug("Manual API response: " + JSON.stringify(result), result.success ? "success" : "error");

          if (result.success) {
            showResult(`✅ Check-in berhasil!<br>Seat: ${seat}`, "success");
            await loadStats();
          } else {
            showResult(`❌ ${result.message}`, "error");
          }
        } catch (e) {
          addDebug("Manual validation error: " + e.message, "error");
          showResult("❌ Error: " + e.message, "error");
        }
      }

      function showResult(html, type) {
        const box = document.getElementById("result-box");
        box.className = "result-box";

        if (type === "success") box.classList.add("result-success");
        else if (type === "error") box.classList.add("result-error");
        else if (type === "warning") box.classList.add("result-warning");
        else box.classList.add("empty");

        box.innerHTML = html;
      }

      async function loadStats() {
        try {
          const response = await fetch(API_URL + "?action=stats");
          const data = await response.json();

          if (data.success && data.stats) {
            document.getElementById("stat-total").textContent = data.stats.total;
            document.getElementById("stat-checked").textContent = data.stats.checkedIn;
            document.getElementById("stat-remaining").textContent = data.stats.remaining;
            addDebug("Stats loaded: " + JSON.stringify(data.stats), "info");
          }
        } catch (e) {
          addDebug("Stats error: " + e.message, "error");
        }
      }

      window.addEventListener("beforeunload", () => {
        if (html5QrCode && isScanning) html5QrCode.stop();
      });

      setInterval(() => {
        if (!scanPaused && isScanning) loadStats();
      }, 30000);
    </script>
  </body>
</html>
